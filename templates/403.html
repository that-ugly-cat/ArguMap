<!DOCTYPE html>
<html lang="{{ lang or 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArguMap</title>
  <link rel="icon" type="image/png" href="/imgs/logo-automap-squared.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e2e8f0;
    }

    .card {
      text-align: center;
      max-width: 420px;
      padding: 3rem 2rem;
    }

    .emoji {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.8rem;
    }

    p {
      font-size: 0.88rem;
      color: #718096;
      line-height: 1.7;
      margin-bottom: 0.5rem;
    }

    a.back-btn {
      display: inline-block;
      margin-top: 1.8rem;
      padding: 0.5rem 1.2rem;
      background: #0a3c8a;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }

    a.back-btn:hover { background: #0d4fa8; }

    .lang-toggle {
      position: fixed;
      top: 1rem;
      right: 1.2rem;
      font-size: 0.72rem;
      color: #4a5568;
      background: #0f1117;
      border: none;
      cursor: pointer;
    }
    .lang-toggle:hover { color: #a0aec0; }
  </style>
</head>
<body>
  <select class="lang-toggle" onchange="location='/lang/'+this.value+'?next=/app'">
    <option value="en"{% if lang == 'en' %} selected{% endif %}>EN</option>
    <option value="it"{% if lang == 'it' %} selected{% endif %}>IT</option>
    <option value="de"{% if lang == 'de' %} selected{% endif %}>DE</option>
  </select>
  <div class="card">
    <div class="emoji">🙈</div>
    <h1>{{ t.err403_title }}</h1>
    <p>{{ t.err403_msg1 }}</p>
    <p>{{ t.err403_msg2 }}</p>
    <a class="back-btn" href="/app">{{ t.err403_back }}</a>
  </div>
</body>
</html>
